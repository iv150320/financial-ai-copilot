version: "3.9"

networks:
  ai-platform:
    name: ai-platform
    external: true

services:
  postgres:
    image: postgres:16-alpine
    container_name: fincop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot
      POSTGRES_DB: copilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-platform

  redis:
    image: redis:7-alpine
    container_name: fincop-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-platform

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: fincop-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://copilot:copilot@postgres:5432/copilot
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY=change-me-in-production
      - DEBUG=false
      # NIM Gateway
      - NIM_GATEWAY_URL=http://nvidia-nim-gateway:8000
      # OpenTelemetry
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://observability-platform:4318
      - OTEL_SERVICE_NAME=financial-ai-copilot
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - ai-platform

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: fincop-worker
    restart: unless-stopped
    command: celery -A worker.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://copilot:copilot@postgres:5432/copilot
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY=change-me-in-production
      # NIM Gateway
      - NIM_GATEWAY_URL=http://nvidia-nim-gateway:8000
      # OpenTelemetry
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://observability-platform:4318
      - OTEL_SERVICE_NAME=financial-ai-copilot
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai-platform

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: fincop-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api
    depends_on:
      backend:
        condition: service_started
    networks:
      - ai-platform

volumes:
  postgres_data:
  redis_data:
